<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <!-- Smooth drop shadow for premium depth -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#1B5E20" flood-opacity="0.15" />
    </filter>
  </defs>

  <g filter="url(#shadow)">
    <!-- Base Group for Interlocking Loops -->
    <!-- Top Loop -->
    <g transform="translate(200, 140) rotate(0)">
      <rect x="-45" y="-75" width="90" height="130" rx="45" ry="45" fill="none" stroke="#2E7D32" stroke-width="12" stroke-linejoin="round"/>
      <rect x="-33" y="-63" width="66" height="106" rx="33" ry="33" fill="none" stroke="#66BB6A" stroke-width="4" stroke-linejoin="round"/>
    </g>

    <!-- Right Loop -->
    <g transform="translate(260, 200) rotate(90)">
      <rect x="-45" y="-75" width="90" height="130" rx="45" ry="45" fill="none" stroke="#2E7D32" stroke-width="12" stroke-linejoin="round"/>
      <rect x="-33" y="-63" width="66" height="106" rx="33" ry="33" fill="none" stroke="#66BB6A" stroke-width="4" stroke-linejoin="round"/>
    </g>

    <!-- Bottom Loop -->
    <g transform="translate(200, 260) rotate(180)">
      <rect x="-45" y="-75" width="90" height="130" rx="45" ry="45" fill="none" stroke="#2E7D32" stroke-width="12" stroke-linejoin="round"/>
      <rect x="-33" y="-63" width="66" height="106" rx="33" ry="33" fill="none" stroke="#66BB6A" stroke-width="4" stroke-linejoin="round"/>
    </g>

    <!-- Left Loop -->
    <g transform="translate(140, 200) rotate(270)">
      <rect x="-45" y="-75" width="90" height="130" rx="45" ry="45" fill="none" stroke="#2E7D32" stroke-width="12" stroke-linejoin="round"/>
      <rect x="-33" y="-63" width="66" height="106" rx="33" ry="33" fill="none" stroke="#66BB6A" stroke-width="4" stroke-linejoin="round"/>
    </g>

    <!-- Interlocking Overlay pieces to simulate weave/link effect -->
    <!-- Top-Right Link intersection weave -->
    <path d="M 220 120 A 45 45 0 0 1 245 155" fill="none" stroke="#2E7D32" stroke-width="12" stroke-linecap="round"/>
    <path d="M 220 120 A 45 45 0 0 1 245 155" fill="none" stroke="#66BB6A" stroke-width="4" stroke-linecap="round"/>

    <!-- Bottom-Right Link intersection weave -->
    <path d="M 245 245 A 45 45 0 0 1 200 280" fill="none" stroke="#2E7D32" stroke-width="12" stroke-linecap="round"/>
    <path d="M 245 245 A 45 45 0 0 1 200 280" fill="none" stroke="#66BB6A" stroke-width="4" stroke-linecap="round"/>

    <!-- Bottom-Left Link intersection weave -->
    <path d="M 180 280 A 45 45 0 0 1 155 245" fill="none" stroke="#2E7D32" stroke-width="12" stroke-linecap="round"/>
    <path d="M 180 280 A 45 45 0 0 1 155 245" fill="none" stroke="#66BB6A" stroke-width="4" stroke-linecap="round"/>

    <!-- Top-Left Link intersection weave -->
    <path d="M 155 155 A 45 45 0 0 1 200 120" fill="none" stroke="#2E7D32" stroke-width="12" stroke-linecap="round"/>
    <path d="M 155 155 A 45 45 0 0 1 200 120" fill="none" stroke="#66BB6A" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>